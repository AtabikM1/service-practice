name: Deploy to VPS

on:
  push:
    branches: [ "main" ] # Robot jalan hanya saat push ke branch main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Ganti 'my-app' dengan nama repo Docker Hub-mu
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest

  deploy-to-vps:
    needs: build-and-push # Tunggu build selesai baru deploy
    runs-on: ubuntu-latest
    steps:
      - name: SSH to VPS and Update Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSHKEY }}
          script: |
            # Masuk ke folder project (sesuaikan)
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
            docker stop my-container || true
            docker rm my-container || true
            docker run -d --name my-container -p 80:80 ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
