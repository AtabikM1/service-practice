name: Deploy to VPS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- TARUH DI SINI ---
      - name: Debug Secret Check
        run: |
          echo "Username length: ${#USER}"
          echo "Token length: ${#TOKEN}"
        env:
          USER: ${{ secrets.DOCKERHUB_USERNAME }}
          TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      # ---------------------

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/invent-master:latest
  deploy-to-vps:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy Production Compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSHKEY }}
          source: "docker-compose.prod.yml" # KIRIM FILE YANG BENAR
          target: "~/invent-wms"

      - name: SSH to VPS and Update Container
        uses: appleboy/ssh-action@v1.0.3
        with:
            host: ${{ secrets.HOST }}
            username: ${{ secrets.USERNAME }}
            key: ${{ secrets.SSHKEY }}
            script: |
              # Pindah ke folder kerja yang benar (Absolute Path)
              cd /home/atabik/invent-wms

              # MEMBANGUN ULANG .ENV SECARA LENGKAP
              # Perhatikan simbol '>' untuk baris pertama (overwrite)
              # dan '>>' untuk baris selanjutnya (append)

              echo "APP_NAME='WMS Master'" > .env
              echo "APP_ENV=production" >> .env
              echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env
              echo "APP_DEBUG=false" >> .env
              echo "APP_URL=${{ secrets.APP_URL }}" >> .env

              echo "LOG_CHANNEL=stack" >> .env

              echo "DB_CONNECTION=mysql" >> .env
              echo "DB_HOST=wms_db" >> .env
              echo "DB_PORT=3306" >> .env
              echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> .env
              echo "DB_USERNAME=root" >> .env
              echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env

              echo "CACHE_DRIVER=file" >> .env
              echo "SESSION_DRIVER=file" >> .env
              echo "QUEUE_CONNECTION=sync" >> .env

              # EKSEKUSI DOCKER
              docker compose -f docker-compose.prod.yml pull
              docker compose -f docker-compose.prod.yml up -d --force-recreate

              # JEDA AGAR DB SIAP
              echo "Waiting for database..."
              sleep 15

              # CLEAR CONFIG DAN MIGRATE
              docker exec wms_app php artisan config:clear
              docker exec wms_app php artisan migrate --force

              # BERSIHKAN IMAGE LAMA
              docker image prune -f
