name: Deploy to VPS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- TARUH DI SINI ---
      - name: Debug Secret Check
        run: |
          echo "Username length: ${#USER}"
          echo "Token length: ${#TOKEN}"
        env:
          USER: ${{ secrets.DOCKERHUB_USERNAME }}
          TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      # ---------------------

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/invent-master:latest
  deploy-to-vps:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Kita butuh ini supaya GitHub bisa baca docker-compose.yml

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7 # Gunakan SCP untuk kirim file YML ke VPS
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSHKEY }}
          source: "docker-compose.yml"
          target: "~/invent-wms"

      - name: SSH to VPS and Update Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSHKEY }}
          script: |
            cd ~/invent-wms

            # 1. Tarik Image Terbaru
            docker compose pull

            # 2. Nyalakan ulang (Otomatis ganti container lama)
            docker compose up -d

            # 3. OTOMATISASI DATABASE (Sangat Penting!)
            # Tunggu db siap sebentar
            sleep 10
            docker exec wms_app php artisan migrate --force

            # 4. Bersihkan Image lama yang tidak terpakai (biar storage VPS gak penuh)
            docker image prune -f
