services:

    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: wms_app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
        networks:
            - wms_network


    nginx:
        image: nginx:alpine
        container_name: service-nginx
        restart: unless-stopped
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/local.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - wms_network


    db:
        image: mysql:8.0
        container_name: wms_db
        restart: unless-stopped
        environment:

            MYSQL_DATABASE: ${DB_DATABASE:-wms_local}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password_lokal}
        volumes:
            - db_data:/var/lib/mysql
        ports:
            - "33060:3306"
        networks:
            - wms_network

networks:
    wms_network:
        driver: bridge

volumes:
    db_data:
