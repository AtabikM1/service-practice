# HTTP to HTTPS Redirect & Certbot Challenge untuk Utama
server {
    listen 80;
    server_name atabikm.me www.atabikm.me;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server Utama
server {
    listen 443 ssl;
    server_name atabikm.me www.atabikm.me;

    ssl_certificate /etc/letsencrypt/live/atabikm.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atabikm.me/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass wms_app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}
