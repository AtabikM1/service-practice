services:
  app:
    image: ${DOCKERHUB_USERNAME}/invent-master:latest
    container_name: wms_app
    restart: unless-stopped
    volumes:
      # WAJIB: Bagikan kode ke volume bersama
      - wms_app_code:/var/www
      - ./.env:/var/www/.env
    networks:
      - wms_network

  nginx:
    image: nginx:alpine
    container_name: wms_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # WAJIB: Ambil kode dari volume bersama
      - wms_app_code:/var/www
      # WAJIB: Mount file konfigurasi dari VPS ke dalam Nginx
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - app
    networks:
      - wms_network

  db:
    image: mysql:8.0
    container_name: wms_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wms_network

networks:
  wms_network:
    driver: bridge

volumes:
  db_data:
  wms_app_code:
